<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- title and logo -->
    <title>GitHub Issues Tracker</title>
    <link rel="shortcut icon" href="./assets/github-logo.png">
    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- daisy UI and Tailwind.CSS -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font integretion -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="m-2 md:m-5">
        <div class="navbar bg-base-100 shadow-sm rounded-xl p-2 md:p-4">
            <div class="flex flex-col gap-2 md:flex-row justify-between items-center w-full md:gap-4">
                <a href="" class="flex items-center gap-2 shrink-0">
                    <img class="h-[36px] w-[37px] mx-auto md:mx-0" src="./assets/github-logo.png" alt="">
                    <span class="font-bangla text-xs md:text-lg font-semibold">GitHub Issues Tracker</span>
                </a>
            </div>
            <div class="navbar-end lg:flex">
                <div class="join gap-3">
                    <div>
                        <label class="input">
                            <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                <g
                                stroke-linejoin="round"
                                stroke-linecap="round"
                                stroke-width="2.5"
                                fill="none"
                                stroke="currentColor"
                                >
                                <circle cx="11" cy="11" r="8"></circle>
                                <path d="m21 21-4.3-4.3"></path>
                                </g>
                            </svg>
                            <input id="search-ingine" type="search" required placeholder="Search issues..." />
                        </label>
                    </div>
                    <button id="btn-search" class="btn btn-primary join-item hidden sm:inline"><span class="">+ </span>New Issue</button>
                </div>
            </div>
        </div>
    </header>

    <section class="bg-base-200 p-4 md:p-8 lg:p-12">
        <div class="flex flex-wrap justify-center md:justify-start gap-2 bg-white p-4 rounded-md w-11/12 mx-auto">
            <button id="btn-all" class="btn btn-sm md:btn-md filter-btn">All</button>
            <button id="btn-open" class="btn btn-sm md:btn-md filter-btn">Open</button>
            <button id="btn-Closed" class="btn btn-sm md:btn-md filter-btn">Closed</button>
        </div>
    </section>

    <section class="bg-base-200 p-12">
        <div class="flex flex-col md:flex-row justify-between items-center bg-white p-6 rounded-md w-11/12 mx-auto gap-6">
            <div class="flex flex-col sm:flex-row items-center gap-4 text-center sm:text-left">
                <img class="bg-violet-200 rounded-full" src="./assets/Aperture.png" alt="">
                <div class="">
                    <h2 class="text-xl font-bold"><span id="length-issues">0 </span> Issues</h2>
                    <p class="text-[12px] font-medium text-gray-500">Track and manage your project issues</p>
                </div>
            </div>

            <div class="flex gap-2 items-center">
                <img class="w-3 h-3" src="./assets/Ellipse 2.png" alt="">
                <p>Open</p>
                <img class="w-3 h-3" src="./assets/Ellipse 2 (1).png" alt="">
                <p>Closed</p>
            </div>
        </div>

        <div id="loading-spinner" class="hidden flex justify-center items-center p-10 col-span-full">
            <span class="loading loading-spinner loading-lg text-primary"></span>
        </div>

        <div id="issues-card" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 bg-white rounded-md w-11/12 mx-auto gap-3 p-4">
        </div>
    </section>


    <dialog id="issue_modal" class="modal">
    <div class=" modal-box w-[95%] max-w-2xl p-4 md:p-8 w-11/12 max-w-3xl rounded-2xl bg-white relative">
        <h3 id="modal-title" class="text-3xl font-extrabold text-slate-800 mb-2"></h3>
        
        <div class="flex items-center gap-2 text-gray-500 text-sm mb-6">
            <span id="modal-status-badge" class="badge badge-success text-white px-4 py-3 rounded-full font-bold">Opened</span>
            <span>•</span>
            <p>Opened by <span id="modal-author" class="font-semibold text-slate-700"></span></p>
            <span>•</span>
            <p id="modal-date"></p>
        </div>

        <div id="modal-labels" class="flex gap-2 mb-8"></div>

        <p id="modal-description" class="text-lg text-slate-500 leading-relaxed mb-10"></p>

        <div class="grid grid-cols-2 gap-4 bg-slate-50 p-6 rounded-2xl mb-6">
            <div>
                <p class="text-gray-400 font-medium mb-1">Assignee:</p>
                <p id="modal-assignee" class="text-xl font-bold text-slate-800"></p>
            </div>
            <div>
                <p class="text-gray-400 font-medium mb-1">Priority:</p>
                <span id="modal-priority" class="px-4 py-1 rounded-full text-white font-bold text-sm uppercase"></span>
            </div>
        </div>

        <div class="modal-action">
        <form method="dialog">
            <button class="btn btn-primary bg-indigo-600 border-none px-10 hover:bg-indigo-700 text-white rounded-lg">Close</button>
        </form>
        </div>
    </div>
    </dialog>


    <script src="script.js"></script>
</body>
</html>
