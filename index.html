<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <!-- tailWind+Daisy -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- icons -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body class="min-h-screen bg-gray-100 max-w-md mx-auto">
    <div class="bg-white m-16 rounded-sm">
        <div class="logo justify-items-center mx-auto pt-8 space-y-2">
            <img src="./assets/github-logo.png" alt="">
            <h1 class="text-[20px] font-bold">GitHub Issues Tracker</h1>
            <p class="text-[12px] text-[#778ca9]">Sign in to manage your issues</p>
        </div>
        <div class="form">
            <div class="card w-full max-w-[400px] border-gray-100 p-6">
                <div class="card-body">
                    <fieldset class="fieldset flex flex-col">
                    <div class="space-y-2">
                        <label class="label text-neutral font-medium">Username</label>
                        <input id="input-user" type="text" class="input input-bordered w-full rounded-md bg-gray-50 min-h-6 p-2" placeholder="Enter Username" />
                        <p class="text-[12px] text-violet-600">Default: admin</p>
                    </div>
                    <div>
                        <label class="label text-neutral font-medium">Password</label>
                        <input id="input-pin" type="password" class="input-bordered w-full rounded-md bg-gray-50 min-h-6 p-2" placeholder="Enter Password"/>
                        <p class="text-[12px] text-violet-600">Default: admin123</p>
                    </div>
                    <button id="signin-btn" class="btn btn-primary bg-[#4A00FF] text-white mt-4 rounded-md w-full capitalize min-h-8 text-sm">Sign In</button>

                    <div class="text-center space-y-2">
                        <p class="text-[12px] font-semibold text-gray-500 pt-2">OR</p>
                        <p class="text-[10px] text-gray-500 ">Demo Credentials:</p>
                        <div class="text-sm bg-gray-100 p-2 rounded-md">
                            <p><strong class="text-[12px]">Username: </strong>admin</p>
                            <p><strong class="text-[12px]">Password: </strong>admin123</p>
                        </div>
                    </div>
                    </fieldset>
                </div>
            </div>
        </div> 

    </div>


    <script src="login.js"></script>
</body>
</html>
